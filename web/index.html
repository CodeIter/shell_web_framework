<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hello World</title>
  <style>
    :root{
      --bg:#0f1724;      /* dark blue-gray */
      --card:#0b1220;
      --accent:#7dd3fc;  /* cyan */
      --muted:#94a3b8;
      --glass: rgba(255,255,255,0.04);
      --radius:14px;
      --maxw:720px;
      --ff:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
    }

    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--ff);
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(125,211,252,0.06), transparent 15%),
        radial-gradient(700px 350px at 90% 90%, rgba(99,102,241,0.04), transparent 15%),
        var(--bg);
      color: #e6eef8;
      display:grid;
      place-items:center;
      padding:48px 20px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .card{
      width:100%;
      max-width:var(--maxw);
      background: linear-gradient(180deg,var(--card), rgba(255,255,255,0.02));
      border-radius:var(--radius);
      padding:36px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
    }

    header{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:18px;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:12px;
      background:conic-gradient(from 120deg, var(--accent), #6366f1 40%, #60a5fa 80%);
      display:grid;
      place-items:center;
      font-weight:700;
      color:#032025;
      box-shadow: 0 6px 18px rgba(125,211,252,0.06);
    }

    h1{
      font-size:1.6rem;
      margin:0;
      line-height:1.05;
    }

    p.lead{
      margin:0 0 18px 0;
      color:var(--muted);
    }

    .content{
      display:flex;
      gap:20px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:0;
      padding:10px 16px;
      background:linear-gradient(180deg,var(--accent), #60a5fa);
      color:#032025;
      font-weight:600;
      border-radius:10px;
      box-shadow: 0 6px 18px rgba(125,211,252,0.12);
      cursor:pointer;
    }

    .meta{
      margin-left:auto;
      color:var(--muted);
      font-size:0.9rem;
    }

    footer{
      margin-top:18px;
      color:var(--muted);
      font-size:0.9rem;
    }

    @media (max-width:520px){
      .content{flex-direction:column; align-items:flex-start}
      .meta{margin-left:0}
      header{gap:12px}
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <header>
      <div class="logo">HW</div>
      <div>
        <h1>Hello, world!</h1>
        <p class="lead">A minimal, responsive HTML5 + CSS3 home page.</p>
      </div>
    </header>

    <section class="content">
      <p style="margin:0;color:var(--muted)">Welcome — this is a starter template you can drop into a project.</p>
    </section>

    <footer>
      Built with plain HTML5 and CSS3.
    </footer>
  </main>
</body>
</html>
